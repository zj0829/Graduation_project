<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI安全对话 - 渗透测试智能辅助系统</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #ffffff;
            --bg-side: #f7f8fa;
            --bg-hover: #f0f1f5;
            --bg-active: #e8e9f0;
            --bg-input: #f4f5f7;
            --text: #1a1a2e;
            --text-2: #5a5a7a;
            --text-3: #9898b0;
            --accent: #1e40af;
            --accent-light: #1d4ed8;
            --accent-bg: rgba(30,64,175,0.08);
            --border: #e5e7eb;
            --border-2: #d1d5db;
            --success: #10b981;
            --danger: #ef4444;
            --user-bg: #1e40af;
            --user-text: #ffffff;
            --ai-bg: #f7f8fa;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }

        .sidebar {
            width: 272px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 18px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header h2 svg { width: 16px; height: 16px; color: var(--accent); }
        .new-chat-btn {
            width: 100%;
            padding: 9px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .new-chat-btn:hover { background: var(--accent-light); }
        .new-chat-btn svg { width: 14px; height: 14px; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }
        .session-list::-webkit-scrollbar { width: 4px; }
        .session-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
        .session-item {
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .session-item:hover { background: var(--bg-hover); }
        .session-item.active { background: var(--bg-active); }
        .session-item .info { flex: 1; min-width: 0; }
        .session-item .title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-item .meta {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
        }
        .session-item .del-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
            font-size: 12px;
        }
        .session-item:hover .del-btn { opacity: 1; }
        .session-item .del-btn:hover { background: rgba(239,68,68,0.1); }

        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .topbar {
            padding: 12px 20px;
            border-bottom: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
            color: white;
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .topbar h1 {
            font-size: 15px;
            font-weight: 700;
            color: white;
        }
        .model-select {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        .model-select:focus { border-color: rgba(255,255,255,0.5); }
        .model-select option { background: white; color: #1e293b; }

        .mcp-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .mcp-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-3);
        }
        .mcp-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.4); }

        .back-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fde68a; }
        .back-link svg { width: 15px; height: 15px; }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: var(--bg);
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }
        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            box-shadow: 0 6px 24px rgba(79,70,229,0.25);
        }
        .welcome-icon svg { width: 32px; height: 32px; color: white; }
        .welcome h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
        .welcome p { color: var(--text-2); font-size: 14px; max-width: 380px; line-height: 1.6; }
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .quick-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

        .msg { display: flex; gap: 10px; margin-bottom: 18px; animation: msgIn 0.25s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), #7c3aed); }
        .msg.user .msg-avatar { background: var(--bg-active); }
        .msg-avatar svg { width: 16px; height: 16px; color: white; }
        .msg-bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
        }
        .msg.assistant .msg-bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
            color: var(--text);
        }
        .msg.user .msg-bubble {
            background: var(--user-bg);
            color: var(--user-text);
            border-top-right-radius: 4px;
        }
        .msg-bubble .tools-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--accent);
            background: var(--accent-bg);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .msg-bubble .tools-tag svg { width: 11px; height: 11px; }

        .msg-content h1,.msg-content h2,.msg-content h3 { font-weight: 700; margin: 0.4em 0 0.2em; color: var(--text); }
        .msg-content h1 { font-size: 1.15rem; }
        .msg-content h2 { font-size: 1.05rem; }
        .msg-content h3 { font-size: 0.98rem; }
        .msg-content p { margin: 0.25em 0; }
        .msg-content ul,.msg-content ol { padding-left: 1.2em; margin: 0.25em 0; }
        .msg-content li { margin: 0.1em 0; }
        .msg-content ul li { list-style: disc; }
        .msg-content ol li { list-style: decimal; }
        .msg-content code {
            background: var(--accent-bg);
            color: var(--accent);
            padding: 0.1em 0.35em;
            border-radius: 4px;
            font-size: 0.87em;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .msg-content pre {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 10px 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.4em 0;
            font-size: 0.82rem;
        }
        .msg-content pre code { background: none; color: inherit; padding: 0; }
        .msg-content table { border-collapse: collapse; margin: 0.4em 0; font-size: 0.87rem; width: 100%; }
        .msg-content th { background: var(--accent); color: white; padding: 5px 10px; text-align: left; }
        .msg-content td { padding: 5px 10px; border: 1px solid var(--border); }
        .msg-content tr:nth-child(even) { background: var(--bg-side); }
        .msg-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 3px 10px;
            margin: 0.3em 0;
            background: var(--accent-bg);
            border-radius: 0 6px 6px 0;
        }
        .msg-content strong { color: var(--accent); }

        .cursor-blink::after {
            content: '▌';
            animation: blink 0.8s infinite;
            color: var(--accent);
            font-weight: 400;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        .input-area {
            padding: 14px 20px 18px;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }
        .input-wrap {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            max-width: 780px;
            margin: 0 auto;
        }
        .input-box {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            min-height: 42px;
            max-height: 120px;
        }
        .input-box:focus { border-color: var(--accent); }
        .input-box::placeholder { color: var(--text-3); }
        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent-light); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; }

        .empty-sidebar {
            padding: 20px;
            text-align: center;
            color: var(--text-3);
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                对话历史
            </h2>
            <button class="new-chat-btn" onclick="newChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建对话
            </button>
        </div>
        <div class="session-list" id="sessionList">
            <div class="empty-sidebar">暂无对话记录</div>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <h1>AI 安全对话</h1>
                <select class="model-select" id="modelSelect">
                    <option value="deepseek-chat">DeepSeek Chat</option>
                    <option value="deepseek-reasoner">DeepSeek Reasoner</option>
                    <option value="glm-4-flash">GLM-4.7-Flash</option>
                </select>
                <div class="mcp-badge">
                    <span class="mcp-dot" id="mcpDot"></span>
                    <span id="mcpStatus">检测中</span>
                </div>
            </div>
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                首页
            </a>
            <a href="dashboard.html" class="back-link" style="margin-left:8px;">仪表盘</a>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeBlock">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h2>网络安全 AI 助手</h2>
                <p>基于 MCP 工具集的专业渗透测试对话，支持漏洞分析、工具建议、安全评估</p>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickSend('如何对Web应用进行SQL注入检测？')">SQL注入检测</button>
                    <button class="quick-btn" onclick="quickSend('Nmap扫描的常用参数有哪些？')">Nmap参数</button>
                    <button class="quick-btn" onclick="quickSend('如何防御XSS攻击？')">XSS防御</button>
                    <button class="quick-btn" onclick="quickSend('当前有哪些MCP安全测试工具？')">MCP工具</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea class="input-box" id="chatInput" placeholder="输入网络安全相关问题..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let currentSessionId = '';
let isLoading = false;

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function renderMd(t) {
    if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(t);
    }
    return escapeHtml(t).replace(/\n/g, '<br>');
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function svgIcon(type) {
    const icons = {
        bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
        user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        plug: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6m0 8v6M4.93 4.93l4.24 4.24m5.66 5.66l4.24 4.24M2 12h6m8 0h6M4.93 19.07l4.24-4.24m5.66-5.66l4.24-4.24"/></svg>',
    };
    return icons[type] || '';
}

function hideWelcome() {
    const wb = document.getElementById('welcomeBlock');
    if (wb) wb.style.display = 'none';
}

function addMsg(role, content, toolsInfo) {
    const area = document.getElementById('chatArea');
    hideWelcome();
    const isUser = role === 'user';
    let toolsHtml = '';
    if (toolsInfo && toolsInfo.length > 0) {
        toolsHtml = '<div class="tools-tag">' + svgIcon('plug') + ' MCP: ' + toolsInfo.map(t => t.name).join(', ') + '</div>';
    }
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `
        <div class="msg-avatar">${isUser ? svgIcon('user') : svgIcon('bot')}</div>
        <div class="msg-bubble">
            ${toolsHtml}
            <div class="msg-content">${isUser ? escapeHtml(content) : renderMd(content)}</div>
        </div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
}

function createStreamMsg() {
    const area = document.getElementById('chatArea');
    hideWelcome();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `
        <div class="msg-avatar">${svgIcon('bot')}</div>
        <div class="msg-bubble">
            <div class="msg-content cursor-blink"></div>
        </div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div.querySelector('.msg-content');
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg || isLoading) return;
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMsg('user', msg);

    const contentEl = createStreamMsg();
    let fullText = '';

    try {
        const model = document.getElementById('modelSelect').value;
        const resp = await fetch('/api/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, model, session_id: currentSessionId })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const payload = line.slice(6).trim();
                if (!payload) continue;

                try {
                    const data = JSON.parse(payload);
                    if (data.error) {
                        fullText += data.error;
                        contentEl.innerHTML = renderMd(fullText);
                    } else if (data.done) {
                        if (!currentSessionId && data.session_id) {
                            currentSessionId = data.session_id;
                        }
                        loadSessions();
                    } else if (data.content) {
                        fullText += data.content;
                        contentEl.innerHTML = renderMd(fullText);
                        if (!currentSessionId && data.session_id) {
                            currentSessionId = data.session_id;
                        }
                    }
                } catch (e) {}
            }

            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        contentEl.classList.remove('cursor-blink');
        contentEl.innerHTML = renderMd(fullText);

    } catch (e) {
        contentEl.classList.remove('cursor-blink');
        contentEl.innerHTML = renderMd(fullText || '网络错误，请检查后端服务是否正常运行。');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
}

function quickSend(msg) {
    document.getElementById('chatInput').value = msg;
    sendMessage();
}

function newChat() {
    currentSessionId = '';
    const area = document.getElementById('chatArea');
    area.innerHTML = '';
    const wb = document.createElement('div');
    wb.className = 'welcome';
    wb.id = 'welcomeBlock';
    wb.innerHTML = `
        <div class="welcome-icon">${svgIcon('bot')}</div>
        <h2>网络安全 AI 助手</h2>
        <p>基于 MCP 工具集的专业渗透测试对话，支持漏洞分析、工具建议、安全评估</p>
        <div class="quick-actions">
            <button class="quick-btn" onclick="quickSend('如何对Web应用进行SQL注入检测？')">SQL注入检测</button>
            <button class="quick-btn" onclick="quickSend('Nmap扫描的常用参数有哪些？')">Nmap参数</button>
            <button class="quick-btn" onclick="quickSend('如何防御XSS攻击？')">XSS防御</button>
            <button class="quick-btn" onclick="quickSend('当前有哪些MCP安全测试工具？')">MCP工具</button>
        </div>`;
    area.appendChild(wb);
    renderSessionHighlight('');
}

async function loadSessions() {
    try {
        const resp = await fetch('/api/chat/sessions');
        const data = await resp.json();
        if (data.status === 'success' && data.sessions) {
            renderSessions(data.sessions);
        }
    } catch (e) {}
}

function renderSessions(sessions) {
    const list = document.getElementById('sessionList');
    if (!sessions.length) {
        list.innerHTML = '<div class="empty-sidebar">暂无对话记录</div>';
        return;
    }
    list.innerHTML = sessions.map(s => `
        <div class="session-item ${s.session_id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.session_id}')">
            <div class="info">
                <div class="title">${escapeHtml(s.title)}</div>
                <div class="meta">${s.model} · ${s.updated_at}</div>
            </div>
            <button class="del-btn" onclick="event.stopPropagation();deleteSession('${s.session_id}')" title="删除">✕</button>
        </div>
    `).join('');
}

function renderSessionHighlight(id) {
    document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('data-sid') === id);
    });
}

async function loadSession(sessionId) {
    currentSessionId = sessionId;
    try {
        const resp = await fetch('/api/chat/sessions/' + sessionId);
        const data = await resp.json();
        if (data.status === 'success' && data.messages) {
            const area = document.getElementById('chatArea');
            area.innerHTML = '';
            data.messages.forEach(m => {
                addMsg(m.role, m.content, m.tools_info);
            });
        }
    } catch (e) {}
    loadSessions();
}

async function deleteSession(sessionId) {
    try {
        await fetch('/api/chat/sessions/' + sessionId, { method: 'DELETE' });
        if (currentSessionId === sessionId) {
            newChat();
        }
        loadSessions();
    } catch (e) {}
}

async function checkMcp() {
    try {
        const resp = await fetch('/api/chat/models');
        if (resp.ok) {
            document.getElementById('mcpDot').className = 'mcp-dot online';
            document.getElementById('mcpStatus').textContent = 'MCP 已连接';
        }
    } catch (e) {
        document.getElementById('mcpDot').className = 'mcp-dot';
        document.getElementById('mcpStatus').textContent = 'MCP 未连接';
    }
}

loadSessions();
checkMcp();
document.getElementById('chatInput').focus();
</script>
</body>
</html>
